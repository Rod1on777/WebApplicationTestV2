            max-width: 800px;

            padding: 20px;
            background-color: #f9f9f9;

        header {
            border-bottom: 2px solid #2b579a;

            margin: 0;

        }

            margin-bottom: 15px;
            font-weight: bold;
            color: #444;

        .recipient-info {

            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        .recipient-info .hiring-manager {
            font-weight: bold;
            color: #333;
        }
        .salutation {
            font-weight: bold;
            font-size: 16px;
            color: #2b579a;
            margin-bottom: 15px;
        }
        p {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: justify;
        }
        .placeholder {
            color: #c53030;
            background-color: #fff5f5;
            padding: 0 4px;
            border-radius: 3px;
            font-weight: 500;
        }
        .valediction {
            margin-top: 30px;
            font-size: 14px;
        }
        .signature-section {
            margin-top: 5px;
            font-weight: bold;
